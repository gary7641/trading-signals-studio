<!DOCTYPE html>
<html lang="zh-HK" data-theme="wood" data-mode="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSS Portal - 終極修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        tailwind.config = { theme: { extend: { borderRadius: { 'xl': '10px', '2xl': '14px', '3xl': '20px' } } } }
    </script>
    <style>
        html[data-mode="light"][data-theme="wood"] { --bg-main: #f1fcf5; --bg-sidebar: #ffffff; --bg-card: #ffffff; --border-theme: #d0ebd9; --text-primary: #047857; --bg-accent-active: #047857; }
        /* 基礎樣式 */
        body { background-color: var(--bg-main, #f1fcf5); color: #333; transition: all 0.3s; }
        .theme-sidebar { background-color: var(--bg-sidebar, #ffffff); border-color: var(--border-theme, #d0ebd9); }
        .theme-card { background-color: var(--bg-card, #ffffff); border-color: var(--border-theme, #d0ebd9); }
        .theme-btn-active { background-color: var(--bg-accent-active, #047857); color: #fff !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="h-14 border-b theme-sidebar flex items-center justify-between px-6 z-20">
        <div class="font-bold text-lg tracking-wider flex items-center gap-2">TSS <span class="text-emerald-600">PORTAL</span></div>
        <div class="flex items-center gap-4">
            <button onclick="toggleUpdateLogMenu()" class="text-xs bg-slate-100 border px-3 py-1 rounded-xl font-bold">Admin Log</button>
            <button onclick="toggleProfileMenu()" class="w-9 h-9 rounded-full bg-emerald-600 text-white text-sm font-bold">G</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-48 border-r theme-sidebar p-4 space-y-2">
            <button onclick="switchPage('home')" id="nav-home" class="w-full text-left px-3 py-2 rounded-xl text-xs theme-btn-active font-bold">首頁控制台</button>
            <button onclick="switchPage('crosspower')" id="nav-crosspower" class="w-full text-left px-3 py-2 rounded-xl text-xs font-bold hover:bg-slate-100">Cross Power</button>
            <button onclick="switchPage('analyzer')" id="nav-analyzer" class="w-full text-left px-3 py-2 rounded-xl text-xs font-bold hover:bg-slate-100">History Analyzer</button>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 overflow-y-auto">
            <!-- Pages -->
            <div id="page-home"><h1>控制台首頁</h1></div>
            <div id="page-crosspower" class="hidden"><h1>Cross Power 監控</h1></div>
            
            <!-- THA Page -->
            <div id="page-analyzer" class="hidden space-y-6">
                <div class="border theme-card p-6 rounded-3xl shadow-sm space-y-4">
                    <h2 class="text-lg font-black">THA 數據導入終端</h2>
                    <input type="file" id="csvFileInput" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100" onchange="handleFileSelected(this)">
                </div>

                <div id="analyzer-main-panel" class="hidden space-y-6">
                    <div class="grid grid-cols-4 gap-4">
                        <div class="border theme-card p-5 rounded-2xl"><div>淨利潤</div><div id="kpi-net-profit" class="text-2xl font-black">0</div></div>
                    </div>
                    <div class="border theme-card p-5 rounded-2xl"><canvas id="equityChart"></canvas></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="profileMenu" class="hidden absolute right-4 top-16 w-64 bg-white shadow-xl rounded-2xl p-4 border">
        <h3 class="font-bold text-xs text-slate-400 uppercase">專案選單</h3>
        <button onclick="showToast('切換至 AI Signals Hub')" class="w-full p-2 text-left hover:bg-slate-50 text-xs font-bold rounded-lg">🚀 AI Signals Hub</button>
    </div>

    <div id="updateLogMenu" class="hidden absolute right-20 top-16 w-64 bg-white shadow-xl rounded-2xl p-4 border text-xs">
        <p>系統更新日誌：V6.5 路由與導航功能修復完畢。</p>
    </div>

    <script>
        // 核心導航路由
        function switchPage(pageId) {
            ['home', 'crosspower', 'analyzer'].forEach(p => document.getElementById(`page-${p}`).classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
        }

        function toggleProfileMenu() { document.getElementById('profileMenu').classList.toggle('hidden'); }
        function toggleUpdateLogMenu() { document.getElementById('updateLogMenu').classList.toggle('hidden'); }
        function showToast(msg) { alert(msg); }

        // CSV 解析與處理
        function handleFileSelected(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split('\n').filter(l => l.trim() !== '');
                parsedTrades = lines.map(l => {
                    const cols = l.split(',');
                    return { symbol: cols[1] || 'Unknown', profit: parseFloat(cols[4]) || 0 };
                });
                
                document.getElementById('analyzer-main-panel').classList.remove('hidden');
                document.getElementById('kpi-net-profit').innerText = '$' + parsedTrades.reduce((acc, curr) => acc + curr.profit, 0).toFixed(2);
                
                // 渲染圖表
                const ctx = document.getElementById('equityChart').getContext('2d');
                new Chart(ctx, { type: 'line', data: { labels: parsedTrades.map((_, i) => i), datasets: [{ label: '淨值', data: parsedTrades.map(t => t.profit), borderColor: '#047857' }] } });
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
